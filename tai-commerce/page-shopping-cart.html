<section class="section-content padding-y">

<div class="card">

<table class="table table-borderless table-shopping-cart">
<thead class="text-muted">
<tr class="small text-uppercase">
  <th scope="col">Producto</th>
  <th scope="col" width="120">Cantidad</th>
  <th scope="col" width="120">Precio</th>
  <th scope="col" class="text-right" width="200"> </th>
</tr>
</thead>
<tbody>
<tr>
	<td>
		<figure class="itemside">
			<div class="aside"><img src="../tai-commerce/im-pro/a1.jpg" class="img-sm"></div>
			<figcaption class="info">
				<a href="#" class="title text-dark">Aretes Artesanales Amarillos </a>
				<p class="text-muted small">Color amarillos unico color <br> </p>
			</figcaption>
		</figure>
	</td>
	<td> 
		<select class="form-control">
			<option>1</option>
			<option>2</option>	
			<option>3</option>	
			<option>4</option>	
		</select> 
	</td>
	<td>

			<var class="price">$200.00</var> 
			 
		</div> <!-- price-wrap .// -->
	</td>
	<td class="text-right">

	<a href="#" class="btn btn-light"> Eliminar</a>
	</td>
</tr>

</tbody>

				</dl>
				<dl class="dlist-align">
				  <dt>Descuento:</dt>
				  <dd class="text-right">$0.00</dd>
				</dl>
				<dl class="dlist-align">
				  <dt>Total:</dt>
				  <dd class="text-right  h5"><strong>$200.00</strong></dd>
				</dl>
				<hr>
				<p class="text-center mb-3">

				</p>

	</div>  <!-- card .// -->
	<a href="#" class="btn btn-primary float-md-right"> Pagar <i class=""></i> </a>
	<a href="page-listing-large.html" class="btn btn-light"> <i class="fa fa-chevron-left"></i> Continuar comprando</a>

	<p class="icontext"><i class="icon text-success fa fa-truck"></i>Producto Disponible</p>
</div>
